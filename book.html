  <style>
    :root {
      --nfw-charcoal: #12161C;
      --nfw-charcoal-2: #182029;
      --nfw-forest: #0D2918;
      --nfw-forest-soft: #163824;
      --nfw-amber: #C8941A;
      --nfw-amber-soft: rgba(200, 148, 26, 0.14);
      --nfw-silver: #C8D4CF;
      --nfw-silver-soft: rgba(200, 212, 207, 0.72);
      --nfw-border: rgba(200, 212, 207, 0.16);
      --nfw-panel: rgba(255, 255, 255, 0.04);
      --nfw-panel-strong: rgba(255, 255, 255, 0.06);
      --nfw-ink: #0B0E12;
    }

    html,
    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--nfw-charcoal);
      color: var(--nfw-silver);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(200, 148, 26, 0.05), transparent 22%),
        linear-gradient(135deg, #10141A 0%, #12161C 52%, #0D2918 100%);
    }

    p, li {
      line-height: 1.72;
    }

    .site-shell {
      position: relative;
      overflow: hidden;
    }

    .site-shell::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -2;
      background:
        linear-gradient(rgba(200, 212, 207, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200, 212, 207, 0.03) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.42), rgba(0,0,0,0.08));
    }

    .site-shell::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background:
        radial-gradient(720px 380px at 0% 0%, rgba(13, 41, 24, 0.46), transparent 62%),
        radial-gradient(500px 260px at 100% 0%, rgba(200, 148, 26, 0.06), transparent 58%),
        radial-gradient(720px 400px at 50% 100%, rgba(22, 56, 36, 0.24), transparent 68%);
    }

    .glass-header {
      position: sticky;
      top: 0;
      z-index: 40;
      backdrop-filter: saturate(160%) blur(14px);
      background: rgba(18, 22, 28, 0.78);
      border-bottom: 1px solid rgba(200, 212, 207, 0.08);
    }

    .glass-header::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(
        90deg,
        rgba(200, 148, 26, 0.95) 0%,
        rgba(200, 148, 26, 0.78) 55%,
        rgba(200, 148, 26, 0.35) 82%,
        rgba(200, 148, 26, 0) 100%
      );
    }

    .nav-link {
      color: var(--nfw-silver-soft);
      transition: color 180ms ease;
    }

    .nav-link:hover {
      color: #F2F5F3;
    }

    .nav-cta {
      background: var(--nfw-amber);
      color: var(--nfw-ink);
      transition: transform 180ms ease, background 180ms ease;
    }

    .nav-cta:hover {
      background: #D9A32A;
      transform: translateY(-1px);
    }

    .book-page {
      position: relative;
    }

    .book-hero {
      padding: 5.9rem 1.5rem 2.4rem;
      border-bottom: 1px solid rgba(200, 212, 207, 0.10);
      background:
        linear-gradient(180deg, rgba(13, 41, 24, 0.30), rgba(18, 22, 28, 0.02));
    }

    .book-hero-inner {
      max-width: 72rem;
      margin: 0 auto;
      display: grid;
      gap: 1.4rem;
      align-items: center;
    }

    @media (min-width: 980px) {
      .book-hero-inner {
        grid-template-columns: minmax(280px, 0.72fr) minmax(0, 1.15fr);
      }
    }

    .book-cover-wrap {
      display: flex;
      justify-content: center;
    }

    .book-cover-card {
      width: min(100%, 320px);
      border: 1px solid var(--nfw-border);
      border-radius: 1.2rem;
      background: rgba(255,255,255,0.04);
      padding: 0.9rem;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.18);
    }

    .book-cover-card img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 0.9rem;
      background: rgba(255,255,255,0.03);
    }

    .book-kicker,
    .section-kicker {
      color: var(--nfw-amber);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 0.85rem;
    }

    .book-title {
      color: #F2F5F3;
      font-size: clamp(2.15rem, 4vw, 3.4rem);
      line-height: 1.04;
      letter-spacing: -0.03em;
      font-weight: 800;
      max-width: 13ch;
    }

    .book-subtitle {
      margin-top: 0.5rem;
      color: rgba(200, 212, 207, 0.84);
      font-size: 1rem;
      font-weight: 500;
    }
